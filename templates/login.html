<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DombaKu – Masuk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1a3a2a;
      --green-mid:   #1d4d35;
      --green-accent:#2d7a4f;
      --green-light: #3a9e68;
      --cream:       #f5f0e8;
      --text-dark:   #111;
      --text-muted:  #6b7280;
      --error:       #dc2626;
      --radius:      14px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--green-dark);
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(45,122,79,.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(29,77,53,.4) 0%, transparent 55%);
      position: relative;
      overflow: hidden;
    }

    /* Decorative circles */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.06);
    }
    body::before { width: 600px; height: 600px; top: -200px; right: -150px; }
    body::after  { width: 400px; height: 400px; bottom: -100px; left: -100px; }

    .card {
      background: rgba(255,255,255,.97);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.1);
      position: relative;
      z-index: 1;
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes slideUp {
      from { opacity:0; transform: translateY(24px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-wrap img {
      width: 64px;
      height: 64px;
      margin-bottom: 12px;
    }

    /* SVG logo inline */
    .logo-svg {
      width: 64px; height: 64px;
      background: var(--green-dark);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 12px;
    }

    .brand-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -.3px;
    }
    .brand-title span { color: var(--green-accent); }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #e5e7eb;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      color: var(--text-dark);
      background: #fafafa;
      transition: border-color .2s, box-shadow .2s, background .2s;
      outline: none;
    }

    input:focus {
      border-color: var(--green-accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(45,122,79,.12);
    }

    .input-wrap .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      padding: 0;
      line-height: 1;
    }

    .row-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .row-options label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      margin-bottom: 0;
    }

    .row-options a {
      color: var(--green-accent);
      text-decoration: none;
      font-weight: 600;
    }
    .row-options a:hover { text-decoration: underline; }

    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .2px;
      transition: background .2s, transform .1s, box-shadow .2s;
    }

    .btn-submit:hover {
      background: var(--green-mid);
      box-shadow: 0 6px 20px rgba(26,58,42,.3);
    }
    .btn-submit:active { transform: scale(.98); }

    .register-link {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .register-link a {
      color: var(--green-accent);
      font-weight: 700;
      text-decoration: none;
    }

    .error-box {
      background: #fef2f2;
      border: 1.5px solid #fecaca;
      color: var(--error);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 20px 0;
    }

    /* Demo hint */
    .demo-hint {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #15803d;
      margin-top: 16px;
      text-align: center;
    }
    .demo-hint strong { font-weight: 700; }
  </style>
</head>
<body>

<div class="card">

  <div class="logo-wrap">
    <!-- Logo SVG DombaKu -->
    <div class="logo-svg">
      <svg width="38" height="38" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="42" r="20" fill="white" opacity=".9"/>
        <circle cx="50" cy="42" r="12" fill="white"/>
        <ellipse cx="28" cy="38" rx="11" ry="13" fill="white" opacity=".8"/>
        <ellipse cx="72" cy="38" rx="11" ry="13" fill="white" opacity=".8"/>
        <ellipse cx="50" cy="62" rx="18" ry="14" fill="white" opacity=".85"/>
        <circle cx="45" cy="40" r="3" fill="#1a3a2a"/>
        <circle cx="55" cy="40" r="3" fill="#1a3a2a"/>
        <ellipse cx="50" cy="47" rx="4" ry="3" fill="#1a3a2a" opacity=".4"/>
        <!-- body/curve -->
        <path d="M32 65 Q50 80 68 65" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="brand-title">Selamat Datang di <span>DombaKu</span></div>
    <div class="subtitle">Sistem Peternakan Domba Cerdas</div>
  </div>

  {% if error %}
  <div class="error-box">
    <span>⚠</span> {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="form-group">
      <label for="email">Email</label>
      <div class="input-wrap">
        <span class="icon">✉</span>
        <input type="email" id="email" name="email" placeholder="Enter Email" required autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
        <button type="button" class="toggle-pw" onclick="togglePw()">👁</button>
      </div>
    </div>

    <div class="row-options">
      <label>
        <input type="checkbox" name="remember"> Remember Me
      </label>
      <a href="#">Lupa password?</a>
    </div>

    <button type="submit" class="btn-submit">Masuk</button>
  </form>

  <p class="register-link">Belum punya akun? <a href="#">Daftar di sini</a></p>

  <div class="demo-hint">
    <strong>Demo:</strong> admin@dombaku.com / dombaku123
  </div>

</div>

<script>
  function togglePw() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }
</script>

</body>
</html>
