<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histori Breeding - DombaKu</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    {% include 'components/navbar.html' %}
    {% include 'components/popups/logout_confirm.html' %}
    {% include 'components/popups/logout_success.html' %}

    <!-- Content -->
    <div class="max-w-5xl mx-auto py-12">

        <!-- Header -->
        <div class="relative mb-12">

            <!-- Back Button -->
            <a href="/"
               class="absolute left-0 top-2 text-[#007A57] text-5xl hover:scale-110 transition">

                <i class="bi bi-x-circle"></i>

            </a>

            <!-- Title -->
            <h1 class="text-center text-5xl font-bold">

                Histori Breeding

                <span class="text-[#003D2E]">
                    Ma Domb
                </span>

            </h1>

        </div>

        <!-- History Cards -->
        <div class="flex flex-col items-center gap-10">

            <!-- Card 1 -->
            <div class="bg-[#003D2E] w-[500px] rounded-2xl shadow-xl p-6">
                <div class="flex items-center gap-5 text-white text-4xl">
                    <i class="bi bi-tag text-5xl"></i>
                    <span>404 Domb</span>
                </div>

                <div class="flex items-center gap-5 text-white text-4xl mt-6">
                    <i class="bi bi-calendar3 text-5xl"></i>
                    <span>01 - 04 - 2026</span>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="bg-[#003D2E] w-[500px] rounded-2xl shadow-xl p-6">
                <div class="flex items-center gap-5 text-white text-4xl">
                    <i class="bi bi-tag text-5xl"></i>
                    <span>400 Domb</span>
                </div>

                <div class="flex items-center gap-5 text-white text-4xl mt-6">
                    <i class="bi bi-calendar3 text-5xl"></i>
                    <span>02 - 04 - 2026</span>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="bg-[#003D2E] w-[500px] rounded-2xl shadow-xl p-6">
                <div class="flex items-center gap-5 text-white text-4xl">
                    <i class="bi bi-tag text-5xl"></i>
                    <span>300 Domb</span>
                </div>

                <div class="flex items-center gap-5 text-white text-4xl mt-6">
                    <i class="bi bi-calendar3 text-5xl"></i>
                    <span>03 - 04 - 2026</span>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
