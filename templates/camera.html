<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera - DombaKu</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="h-screen overflow-hidden bg-black">

    <!-- Camera Preview -->
    <div class="relative w-full h-[78vh] bg-black">

        <video
            id="video"
            autoplay
            playsinline
            muted
            class="w-full h-full object-cover">
        </video>

    </div>

    <!-- Bottom Area -->
    <div class="relative h-[22vh] bg-[#EAEAEA]">

        <!-- Cancel -->
        <button
            onclick="window.history.back()"
            class="absolute left-4 bottom-6
                   bg-[#B30000]
                   hover:bg-[#960000]
                   text-white
                   font-bold
                   text-xl
                   sm:text-2xl
                   px-6
                   py-3
                   rounded-xl
                   shadow-lg">

            Cancel

        </button>

        <!-- Capture Button -->
        <div class="absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2">

            <button
                id="captureBtn"
                class="w-24 h-24
                       sm:w-28 sm:h-28
                       rounded-full
                       bg-gray-500
                       shadow-2xl
                       flex
                       items-center
                       justify-center
                       hover:scale-105
                       transition">

                <i class="bi bi-camera text-4xl"></i>

            </button>

        </div>

    </div>

    <!-- Canvas Hidden -->
    <canvas id="canvas" class="hidden"></canvas>

    <script>

        const video = document.getElementById('video');

        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: {
                    ideal: "environment"
                }
            }
        })
        .then((stream) => {
            video.srcObject = stream;
        })
        .catch((error) => {
            console.error(error);

            alert(
                "Kamera tidak dapat diakses. Pastikan izin kamera sudah diberikan."
            );
        });

        const captureBtn = document.getElementById("captureBtn");

        captureBtn.addEventListener("click", () => {

            const canvas = document.getElementById("canvas");

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            const ctx = canvas.getContext("2d");

            ctx.drawImage(
                video,
                0,
                0,
                canvas.width,
                canvas.height
            );

            const image = canvas.toDataURL("image/png");

            console.log("Foto berhasil diambil");

            alert("Foto berhasil diambil");

            /*
            nanti bisa dikirim ke Flask:

            fetch('/save-photo', {
                method: 'POST',
                body: image
            })
            */

        });

    </script>

</body>
</html>
