<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DombaKu Dashboard</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    {% include 'components/navbar.html' %} 
    {% include 'components/popups/logout_confirm.html' %}
    {% include 'components/popups/logout_success.html' %}

    <!-- Content -->
    <main class="max-w-7xl mx-auto">

        <!-- Welcome -->
        <section class="text-center mt-12">
            <h1 class="text-6xl font-bold">
                Selamat datang,
                <span class="text-[#003D2E]">
                    Ma Domb
                </span>
            </h1>
            <p class="mt-2 text-gray-500 text-xl font-semibold">
                Semoga harimu menyenangkan dan peternakanmu selalu berkembang dengan baik.
            </p>
        </section>

        <!-- Cards -->
        <section class="mt-16 flex justify-center gap-12 flex-wrap">

            <!-- Kamera -->
            <a href="/camera"
               class="bg-[#003D2E]
                      w-[420px]
                      h-[240px]
                      rounded-2xl
                      shadow-2xl
                      flex
                      flex-col
                      justify-center
                      items-center
                      text-white
                      hover:scale-105
                      transition
                      duration-300">
                <i class="bi bi-camera text-8xl"></i>
                <h2 class="text-5xl font-light mt-4">
                    Kamera
                </h2>
            </a>

            <!-- Histori -->
            <a href="/history"
               class="bg-[#003D2E]
                      w-[420px]
                      h-[240px]
                      rounded-2xl
                      shadow-2xl
                      flex
                      flex-col
                      justify-center
                      items-center
                      text-white
                      hover:scale-105
                      transition
                      duration-300">

                <i class="bi bi-clock-history text-8xl"></i>
                <h2 class="text-5xl font-light mt-4">
                    Histori
                </h2>
            </a>

        </section>

    </main>

</body>
</html>
